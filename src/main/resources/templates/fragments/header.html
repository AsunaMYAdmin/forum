<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">

<head th:fragment="head-css">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <title></title>
</head>

<header th:fragment="header" class="site-header">
  <div class="header-inner">

    <!-- LOGO (без изменений) -->
    <a th:href="@{/}" class="header-logo">
      <span class="logo-sys">FORUM</span>
      <span class="logo-sep">/</span>
      <span class="logo-lg">LOREGARD</span>
    </a>

    <!-- NAV (без изменений) -->
    <nav class="header-nav">
      <a th:href="@{/}" class="nav-link">Главная</a>
      <a th:href="@{/about}" class="nav-link">О Форуме</a>
      <a th:href="@{/topic/rules}" class="nav-link nav-link--rules">
        <span class="rules-dot"></span>
        Правила
      </a>
    </nav>

    <!-- RIGHT -->
    <div class="header-right">
      <!-- Кнопка на основной сайт (без изменений) -->
      <a href="https://loregard.ru" target="_blank" class="btn-main-site">
        <span>LOREGARD</span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 10L10 2M10 2H4M10 2V8" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </a>

      <!-- Неавторизован -->
      <div sec:authorize="isAnonymous()">
        <a th:href="@{/oauth2/authorization/loregard-site}" class="btn-login">
          <span>⚡</span>
          Войти на форум
        </a>
      </div>

      <!-- Авторизован -->
      <div sec:authorize="isAuthenticated()" class="header-user">
        <div class="user-avatar">
          <span th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">A</span>
        </div>
        <span class="user-name" th:text="${#authentication.name}">Игрок</span>

        <!-- Кнопка админки (видна только админам) -->
        <div sec:authorize="hasAnyRole('ADMIN', 'GAME_MASTER', 'SYSTEM')" class="admin-button-wrapper">
          <a th:href="@{/admin}" class="btn-admin">
            <span class="admin-icon">⚔️</span>
            <span class="admin-text">Админка</span>
          </a>
        </div>

        <!-- Кнопка выхода (обновлённый дизайн) -->
        <form th:action="@{/logout}" method="post" class="logout-form">
          <button type="submit" class="btn-logout">
            <span class="logout-icon">🚪</span>
            <span class="logout-text">Выйти</span>
          </button>
        </form>
      </div>
    </div>

  </div>
</header>

</html>
